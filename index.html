<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas para Ti 🌻</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #ff5e62, #ff914d, #f7c948);
            height: 100vh;
            width: 100vw;
        }

        .sun {
            position: absolute;
            top: 5%;
            left: 5%;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #fff176, #fbc02d);
            border-radius: 50%;
            box-shadow: 0 0 50px 15px rgba(255, 200, 0, 0.5);
            z-index: 1;
        }

        .message {
            position: absolute;
            top: 15%;
            right: 5%;
            left: 5%; /* Añadido para ayudar al centrado en móvil */
            color: white;
            font-size: 2.5rem; /* Tamaño base más pequeño */
            font-weight: bold;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.3);
            z-index: 10;
            opacity: 0;
            animation: fadeIn 2s forwards 1s;
            text-align: right; /* Por defecto a la derecha */
        }

        .field {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35vh;
            background: linear-gradient(to top, #1b5e20, #4caf50);
            z-index: 2;
            box-shadow: 0 -10px 50px rgba(0,0,0,0.2);
        }

        .flower {
            position: absolute;
            z-index: 5;
            transform-origin: bottom center;
            animation: grow 1s ease-out forwards, sway 3s infinite ease-in-out;
            pointer-events: none;
        }

        .main-flower {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .main-flower:hover {
            transform: translateX(-50%) scale(1.1) rotate(5deg);
        }

        /* --- Ajustes para Celulares --- */
        @media (max-width: 600px) {
            .sun {
                width: 60px;
                height: 60px;
                top: 2%;
            }
            .message {
                top: 25%; /* Bajamos el texto para que no choque con el sol */
                font-size: 2rem;
                text-align: center; /* Centrado en móviles se ve mejor */
            }
            .main-flower {
                font-size: 60px !important; /* Un poco más pequeña en móvil */
            }
        }

        @keyframes grow {
            from { transform: scale(0) rotate(0deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="sun"></div>
    <div class="message">Te amo 💛</div>

    <div class="field" id="field">
        <div class="main-flower" id="mainBtn" style="font-size: 80px; text-align: center;">🌻</div>
    </div>

    <script>
        const field = document.getElementById('field');
        const mainBtn = document.getElementById('mainBtn');

        function spawnFlower() {
            const flower = document.createElement('div');
            flower.innerHTML = "🌻";
            flower.className = 'flower';
            
            // Limitamos el ancho al 90% para que no toquen los bordes exactos en móvil
            const x = Math.random() * 90 + 5; 
            const y = Math.random() * (field.offsetHeight - 40); 
            const size = Math.random() * (40 - 20) + 20;
            const delay = Math.random() * 2;

            flower.style.left = `${x}%`;
            flower.style.bottom = `${y}px`;
            flower.style.fontSize = `${size}px`;
            flower.style.animationDelay = `0s, ${delay}s`;

            field.appendChild(flower);
        }

        mainBtn.addEventListener('click', () => {
            // Reducimos un poco la cantidad para evitar lag en móviles viejos
            for (let i = 0; i < 60; i++) {
                setTimeout(spawnFlower, i * 50);
            }
            
            mainBtn.style.transform = "translateX(-50%) scale(0.9)";
            setTimeout(() => {
                mainBtn.style.transform = "translateX(-50%) scale(1)";
            }, 100);
        });
    </script>
</body>
</html>
