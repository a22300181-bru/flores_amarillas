<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas para Ti 🌻</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            /* Atardecer más vibrante */
            background: linear-gradient(to bottom, #ff5e62, #ff914d, #f7c948);
            height: 100vh;
        }

        /* SOL REALISTA */
        .sun {
            position: absolute;
            top: 10%;
            left: 10%;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #fff176, #fbc02d);
            border-radius: 50%;
            box-shadow: 0 0 80px 20px rgba(255, 200, 0, 0.6);
            z-index: 1;
        }

        /* TEXTO */
        .message {
            position: absolute;
            top: 40px;
            right: 40px;
            color: white;
            font-size: 3.5rem;
            font-weight: bold;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.3);
            z-index: 10;
            opacity: 0;
            animation: fadeIn 2s forwards 1s;
        }

        /* CAMPO DE PASTO */
        .field {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40vh;
            background: linear-gradient(to top, #1b5e20, #4caf50);
            z-index: 2;
            box-shadow: 0 -10px 50px rgba(0,0,0,0.2);
        }

        /* ESTILO DE LAS FLORES */
        .flower {
            position: absolute;
            z-index: 5;
            transform-origin: bottom center;
            animation: grow 1s ease-out forwards, sway 3s infinite ease-in-out;
            pointer-events: none; /* Para que no estorben al click */
        }

        /* GIRASOL PRINCIPAL (EL BOTÓN) */
        .main-flower {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .main-flower:hover {
            transform: translateX(-50%) scale(1.2) rotate(5deg);
        }

        /* ANIMACIONES */
        @keyframes grow {
            from { transform: scale(0) rotate(0deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="sun"></div>
    <div class="message">Te amo 💛</div>

    <div class="field" id="field">
        <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Animals%20and%20Nature/Sunflower.png" 
             class="main-flower" id="mainBtn" alt="Girasol">
    </div>

    <script>
        const field = document.getElementById('field');
        const mainBtn = document.getElementById('mainBtn');

        // Función para crear flores
        function spawnFlower() {
            const flower = document.createElement('img');
            // Usamos un emoji de alta resolución o imagen directa estable
            flower.src = "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Animals%20and%20Nature/Sunflower.png";
            flower.className = 'flower';
            
            // Posición aleatoria
            const x = Math.random() * 100;
            const y = Math.random() * 80; // Que no pasen del borde superior del pasto
            const size = Math.random() * (70 - 30) + 30;
            const delay = Math.random() * 2;

            flower.style.left = `${x}%`;
            flower.style.bottom = `${y}px`;
            flower.style.width = `${size}px`;
            flower.style.animationDelay = `0s, ${delay}s`; // Delay para el movimiento (sway)

            field.appendChild(flower);
        }

        mainBtn.addEventListener('click', () => {
            // Generar muchas flores con un pequeño intervalo
            for (let i = 0; i < 100; i++) {
                setTimeout(spawnFlower, i * 30);
            }
            
            // Efecto visual al presionar el botón
            mainBtn.style.transform = "translateX(-50%) scale(0.8)";
            setTimeout(() => {
                mainBtn.style.transform = "translateX(-50%) scale(1)";
            }, 100);
        });
    </script>
</body>
</html>
